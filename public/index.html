<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sourceDev — rising developer tools & builders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>sourceDev</h1>
      <span class="tagline">Rising developer tools, and the people building them — found early.</span>
    </div>
    <div class="header-actions">
      <span id="status-line" class="status-line"></span>
      <button id="refresh-btn" class="refresh-btn">Refresh</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="projects">Projects</button>
    <button class="tab" data-tab="builders">Builders</button>
    <button class="tab" data-tab="trends">Trends</button>
    <div class="tab-spacer"></div>
    <label class="saved-toggle"><input type="checkbox" id="saved-only" /> Show saved only</label>
  </nav>

  <main id="feed" class="feed">
    <div class="empty">Loading…</div>
  </main>

  <!-- Profile panel -->
  <div id="overlay" class="overlay hidden"></div>
  <aside id="profile" class="profile hidden">
    <button id="profile-close" class="profile-close" aria-label="Close">×</button>
    <div id="profile-body"></div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
